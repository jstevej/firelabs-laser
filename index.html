<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Laser Resources</title>
  <link rel="icon" href="favicon.ico">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #050810;
      --surface:   #0a0f1e;
      --beam:      #00f0ff;
      --beam-dim:  #00a8b5;
      --hot:       #ff3c6e;
      --hot-dim:   #a81f42;
      --gold:      #ffd166;
      --text:      #c8dce8;
      --text-dim:  #5a7080;
      --glow-cyan: 0 0 8px #00f0ff, 0 0 24px #00f0ff66, 0 0 60px #00f0ff22;
      --glow-red:  0 0 8px #ff3c6e, 0 0 24px #ff3c6e66, 0 0 60px #ff3c6e22;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      overflow-x: hidden;
    }

    /* ── Scanline overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 100;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,.18) 3px,
        rgba(0,0,0,.18) 4px
      );
    }

    /* ── Animated grid floor ── */
    .grid-bg {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,240,255,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,240,255,.06) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridScroll 18s linear infinite;
    }
    @keyframes gridScroll {
      from { background-position: 0 0; }
      to   { background-position: 0 60px; }
    }

    /* ── Radial vignette ── */
    .vignette {
      position: fixed; inset: 0; z-index: 1;
      background: radial-gradient(ellipse at 50% 40%, transparent 30%, #050810cc 90%);
      pointer-events: none;
    }

    /* ── Page layout ── */
    .page {
      position: relative; z-index: 2;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem;
      gap: 0;
    }

    /* ── Top badge ── */
    .badge {
      font-family: 'Orbitron', sans-serif;
      font-size: .65rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--beam-dim);
      border: 1px solid var(--beam-dim);
      padding: .35rem 1rem;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp .6s .2s ease forwards;
    }

    /* ── Hero title ── */
    .hero {
      text-align: center;
      margin-bottom: 1rem;
    }

    .hero-eyebrow {
      font-family: 'Share Tech Mono', monospace;
      font-size: .75rem;
      letter-spacing: .3em;
      color: var(--text-dim);
      margin-bottom: .75rem;
      opacity: 0;
      animation: fadeUp .6s .4s ease forwards;
    }

    .hero-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(3rem, 10vw, 7rem);
      line-height: .95;
      letter-spacing: -.01em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp .7s .5s ease forwards;
    }

    .hero-title .line-laser {
      display: block;
      color: var(--beam);
      text-shadow: var(--glow-cyan);
      position: relative;
    }

    /* Animated underline beam */
    .hero-title .line-laser::after {
      content: '';
      display: block;
      height: 3px;
      width: 0;
      margin: .3rem auto 0;
      background: linear-gradient(90deg, transparent, var(--beam), transparent);
      box-shadow: var(--glow-cyan);
      animation: beamExpand 1s 1.1s ease forwards;
    }
    @keyframes beamExpand {
      to { width: 100%; }
    }

    .hero-title .line-lab {
      display: block;
      color: var(--hot);
      text-shadow: var(--glow-red);
    }

    .hero-sub {
      font-size: .8rem;
      letter-spacing: .18em;
      color: var(--text-dim);
      margin-top: 1.4rem;
      opacity: 0;
      animation: fadeUp .6s .9s ease forwards;
    }

    /* ── Divider beam ── */
    .divider {
      width: min(480px, 90vw);
      height: 1px;
      margin: 2.5rem 0;
      background: linear-gradient(90deg, transparent, var(--beam), var(--hot), transparent);
      box-shadow: 0 0 12px #00f0ff55, 0 0 12px #ff3c6e55;
      opacity: 0;
      animation: fadeIn .6s 1s ease forwards;
    }

    /* ── Cards ── */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      width: min(520px, 92vw);
    }

    .card {
      position: relative;
      display: flex; align-items: center;
      gap: 1.5rem;
      padding: 1.4rem 1.8rem;
      background: rgba(10,15,30,.8);
      border: 1px solid transparent;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      overflow: hidden;
      transition: transform .25s ease, border-color .25s ease;
      opacity: 0;
    }
    .card:nth-child(1) { animation: fadeUp .6s 1.1s ease forwards; }
    .card:nth-child(2) { animation: fadeUp .6s 1.25s ease forwards; }

    /* Corner accents */
    .card::before,
    .card::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      transition: width .3s, height .3s;
    }
    .card::before { top: -1px; left: -1px; border-top: 2px solid; border-left: 2px solid; }
    .card::after  { bottom: -1px; right: -1px; border-bottom: 2px solid; border-right: 2px solid; }

    .card--cyan::before, .card--cyan::after { border-color: var(--beam); }
    .card--red::before,  .card--red::after  { border-color: var(--hot); }

    .card--cyan:hover { border-color: var(--beam); transform: translateX(6px); }
    .card--red:hover  { border-color: var(--hot);  transform: translateX(6px); }

    .card--cyan:hover::before, .card--cyan:hover::after { width: 22px; height: 22px; }
    .card--red:hover::before,  .card--red:hover::after  { width: 22px; height: 22px; }

    /* Sweep shimmer on hover */
    .card-sweep {
      position: absolute; inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,.04) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform .5s ease;
    }
    .card:hover .card-sweep { transform: translateX(100%); }

    /* Icon */
    .card-icon {
      flex-shrink: 0;
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
    }
    .card--cyan .card-icon {
      color: var(--beam);
      filter: drop-shadow(0 0 6px var(--beam));
    }
    .card--red .card-icon {
      color: var(--hot);
      filter: drop-shadow(0 0 6px var(--hot));
    }

    .card-body { flex: 1; min-width: 0; }
    .card-label {
      font-size: .62rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: .3rem;
    }
    .card-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      line-height: 1.2;
    }
    .card--cyan .card-title { color: var(--beam); }
    .card--red  .card-title { color: var(--hot); }

    .card-desc {
      font-size: .72rem;
      color: var(--text-dim);
      margin-top: .35rem;
    }

    .card-arrow {
      flex-shrink: 0;
      font-size: 1.1rem;
      opacity: 0;
      transform: translateX(-8px);
      transition: opacity .25s, transform .25s;
    }
    .card--cyan .card-arrow { color: var(--beam); }
    .card--red  .card-arrow { color: var(--hot); }
    .card:hover .card-arrow { opacity: 1; transform: translateX(0); }

    /* ── Footer ── */
    .footer {
      margin-top: 3rem;
      font-size: .6rem;
      letter-spacing: .2em;
      color: var(--text-dim);
      text-align: center;
      opacity: 0;
      animation: fadeIn .6s 1.5s ease forwards;
    }
    .footer span { color: var(--hot); }

    /* ── Floating sparks ── */
    .sparks { position: fixed; inset: 0; pointer-events: none; z-index: 3; overflow: hidden; }
    .spark {
      position: absolute;
      border-radius: 50%;
      animation: floatSpark linear infinite;
      opacity: 0;
    }
    @keyframes floatSpark {
      0%   { transform: translateY(100vh) scale(1); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: .8; }
      100% { transform: translateY(-10vh) scale(.3); opacity: 0; }
    }

    /* ── Keyframes ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

<div class="grid-bg"></div>
<div class="vignette"></div>
<div class="sparks" id="sparks"></div>

<main class="page">

  <div class="badge">Roswell Firelabs</div>

  <section class="hero">
    <!-- <p class="hero-eyebrow">⚡ High-Power Equipment Station</p> -->
    <h1 class="hero-title">
      <span class="line-laser">Laser</span>
      <span class="line-lab">Resources</span>
    </h1>
    <p class="hero-sub">Select a resource below</p>
  </section>

  <div class="divider"></div>

  <div class="cards">

    <a href="https://docs.google.com/presentation/d/1iA9LGCTx7P6NDBnO32nddNC46cs3vsGhceFs90nIO1k/edit?usp=sharing" class="card card--cyan">
      <div class="card-sweep"></div>
      <div class="card-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
          <path d="M9 10l2 2 4-4"/>
        </svg>
      </div>
      <div class="card-body">
        <p class="card-label">Resource 01</p>
        <p class="card-title">Laser Training Slides</p>
        <p class="card-desc">Safety protocols, machine operation, software use</p>
      </div>
      <div class="card-arrow">→</div>
    </a>

    <a href="https://docs.google.com/document/d/1bJImcshXeOxN2Z48L0AT3261TIlNfqi_R1sjClbMJww/edit?usp=sharing" class="card card--red">
      <div class="card-sweep"></div>
      <div class="card-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="8" y1="13" x2="16" y2="13"/>
          <line x1="8" y1="17" x2="13" y2="17"/>
        </svg>
      </div>
      <div class="card-body">
        <p class="card-label">Resource 02</p>
        <p class="card-title">Materials Guide</p>
        <p class="card-desc">Approved materials, cut settings</p>
      </div>
      <div class="card-arrow">→</div>
    </a>

  </div>

  <!-- <footer class="footer"> -->
  <!--   <span>⚠</span> &nbsp;Always wear appropriate PPE &nbsp;·&nbsp; Never leave machine unattended &nbsp;<span>⚠</span> -->
  <!-- </footer> -->

</main>

<script>
  // Floating sparks
  const container = document.getElementById('sparks');
  const colors = ['#00f0ff','#ff3c6e','#ffd166','#00f0ff'];
  for (let i = 0; i < 28; i++) {
    const s = document.createElement('div');
    s.className = 'spark';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      box-shadow:0 0 ${size*3}px currentColor;
      animation-duration:${6+Math.random()*12}s;
      animation-delay:${Math.random()*10}s;
    `;
    container.appendChild(s);
  }
</script>
</body>
</html>
